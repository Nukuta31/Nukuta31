<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .page {
            display: none;
        
        }

        .page.show {
            display: block;
        }

    </style>

</head>
<body>
    <header>
        <hav>
            <button data-group=".page" data-target="page-1">  Главная </button>
            <button data-group=".page" data-target="page-2">  Моё </button>
            <button data-group=".page" data-target="page-3">  Краткая инфа  </button>
        </hav>
    </header>
            <main>
                <div class="page show" id="page-1">  Меня зовут Никита учусь на специальности программиста второго курса </div>
                <div class="page" id="page-2"> 
                    <input> <button> ✔ </button>
                </div>
                <div class="page" id="page-3">
                    кпдва
                </div>
            </main>
<script>
    document.querySelectorAll('button[data-group]').forEach(button =>{
        button.onclick = event => {
            document.querySelectorAll(button.dataset.group).forEach(function (element){
                element.classList.toggle('show', element.id === event.currentTarget.dataset.target);
            })
        }
    })
</script>
